name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: meta_geniusz_os_e2e
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
        cache: 'pnpm'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build applications
      run: pnpm run build
    
    - name: Install Playwright browsers
      run: pnpm exec playwright install --with-deps
    
    - name: Start API server
      run: pnpm run dev --filter=@meta-geniusz/api &
      env:
        DATABASE_URL: postgresql://e2e:e2e@localhost:5432/meta_geniusz_os_e2e
        NODE_ENV: test
    
    - name: Wait for server to be ready
      run: sleep 5
    
    - name: Run E2E tests
      run: pnpm run test:e2e --if-present
    
    - name: Upload Playwright report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
