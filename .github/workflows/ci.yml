name: CI - Build, Lint, Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: meta_geniusz_os_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run -w @meta-geniusz/api db:generate

      - name: Run DB migrations
        run: npm run -w @meta-geniusz/api db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/meta_geniusz_os_test

      - name: Build all apps
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/meta_geniusz_os_test

      - name: Run unit tests
        run: npm run test --if-present
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/meta_geniusz_os_test

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true

